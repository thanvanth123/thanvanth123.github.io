<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Wallpaper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #050A18; }
    canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
  </style>
</head>
<body>
  <canvas id="wallpaper"></canvas>
  <script>
    const canvas = document.getElementById('wallpaper');
    const ctx = canvas.getContext('2d');

    let W, H, frame = 0;
    let mouseX = -9999, mouseY = -9999;
    const shockwaves = [];

    const NODE_LABELS = [
      'BFS', 'DFS', 'Dijkstra', 'Heap', 'Tree', 'DP', 'Trie',
      'Stack', 'Queue', 'Graph', 'AVL', 'BST', 'QuickSort', 'Hash', 'Greedy'
    ];

    const PURPLE_LABELS = new Set(['Tree', 'AVL', 'BST']);
    const TEAL_LABELS = new Set(['Stack', 'Queue']);

    function nodeColor(label) {
      if (PURPLE_LABELS.has(label)) return '#7C4DFF';
      if (TEAL_LABELS.has(label)) return '#00BCD4';
      return '#00E5FF';
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function initCanvas() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    initCanvas();

    // --- Stars ---
    const stars = Array.from({ length: 120 }, () => ({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.2,
      phase: Math.random() * Math.PI * 2
    }));

    // --- Nodes ---
    const nodes = NODE_LABELS.map(label => ({
      label,
      x: rand(60, W - 60),
      y: rand(60, H - 60),
      r: rand(18, 28),
      vx: rand(-0.4, 0.4),
      vy: rand(-0.4, 0.4),
      z: rand(0.5, 1.0),
      color: nodeColor(label)
    }));

    // --- Graph traversal state ---
    let traversalTimer = 0;
    let traversalPath = [];
    let traversalIndex = 0;
    let traversalStepTimer = 0;
    const traversalEdges = [];

    function dist(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function findNearbyPath(start, count) {
      const path = [start];
      const used = new Set([start]);
      let current = start;

      for (let i = 1; i < count; i++) {
        const candidates = nodes.filter(n =>
          !used.has(n) && dist(current, n) <= 250
        );
        if (candidates.length === 0) break;
        const next = candidates[Math.floor(Math.random() * candidates.length)];
        path.push(next);
        used.add(next);
        current = next;
      }
      return path;
    }

    function startTraversal() {
      const start = nodes[Math.floor(Math.random() * nodes.length)];
      const pathLen = Math.floor(rand(5, 7));
      traversalPath = findNearbyPath(start, pathLen);
      traversalIndex = 0;
      traversalStepTimer = 0;
    }

    startTraversal();

    // --- Input ---
    window.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    window.addEventListener('click', e => {
      shockwaves.push({ x: e.clientX, y: e.clientY, r: 0, alpha: 1 });
    });

    window.addEventListener('resize', () => {
      initCanvas();
    });

    function updateNodes() {
      for (const node of nodes) {
        // Mouse repulsion
        const dx = node.x - mouseX;
        const dy = node.y - mouseY;
        const d = Math.sqrt(dx * dx + dy * dy);

        if (d < 120 && d > 0) {
          const force = ((120 - d) / 120) * 1.2;
          node.vx += (dx / d) * force * 0.08;
          node.vy += (dy / d) * force * 0.08;
        }

        // Dampen & clamp
        node.vx *= 0.99;
        node.vy *= 0.99;
        const speed = Math.sqrt(node.vx * node.vx + node.vy * node.vy);
        if (speed > 2) {
          node.vx = (node.vx / speed) * 2;
          node.vy = (node.vy / speed) * 2;
        }

        // Move with z-depth parallax
        node.x += node.vx * node.z;
        node.y += node.vy * node.z;

        // Wrap edges
        if (node.x < -node.r) node.x = W + node.r;
        else if (node.x > W + node.r) node.x = -node.r;
        if (node.y < -node.r) node.y = H + node.r;
        else if (node.y > H + node.r) node.y = -node.r;
      }
    }

    function updateShockwaves() {
      for (let i = shockwaves.length - 1; i >= 0; i--) {
        const sw = shockwaves[i];
        sw.r += 8;
        sw.alpha -= 0.018;
        if (sw.alpha <= 0) shockwaves.splice(i, 1);
      }
    }

    function updateTraversal() {
      traversalTimer++;
      if (traversalTimer >= 200) {
        traversalTimer = 0;
        startTraversal();
        traversalEdges.length = 0;
      }

      if (traversalPath.length < 2) return;

      traversalStepTimer++;
      if (traversalStepTimer >= 18 && traversalIndex < traversalPath.length - 1) {
        traversalStepTimer = 0;
        const from = traversalPath[traversalIndex];
        const to = traversalPath[traversalIndex + 1];
        traversalEdges.push({ from, to, age: 0 });
        traversalIndex++;
      }

      for (const edge of traversalEdges) {
        edge.age++;
      }
    }

    function drawBackground() {
      ctx.fillStyle = '#050A18';
      ctx.fillRect(0, 0, W, H);

      for (const star of stars) {
        const alpha = 0.15 + 0.35 * (0.5 + 0.5 * Math.sin(frame * 0.02 + star.phase));
        ctx.beginPath();
        ctx.arc(star.x * W, star.y * H, star.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 220, 255, ${alpha})`;
        ctx.fill();
      }
    }

    function drawEdges() {
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i];
          const b = nodes[j];
          const d = dist(a, b);
          if (d <= 180) {
            const alpha = (1 - d / 180) * 0.25;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(30, 136, 229, ${alpha})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
    }

    function drawTraversalEdges() {
      for (const edge of traversalEdges) {
        const alpha = Math.max(0, 0.9 - edge.age * 0.15);
        ctx.beginPath();
        ctx.moveTo(edge.from.x, edge.from.y);
        ctx.lineTo(edge.to.x, edge.to.y);
        ctx.strokeStyle = `rgba(0, 229, 255, ${alpha})`;
        ctx.lineWidth = 2.5;
        ctx.stroke();
      }
    }

    function drawNode(node, isActive) {
      const pulse = 0.5 + 0.5 * Math.sin(frame * 0.03);
      const glowR = node.r * 2.5;
      const glowAlpha = (0.15 + pulse * 0.25) * (isActive ? 1.4 : 1);

      // Radial glow aura
      const grad = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, glowR);
      grad.addColorStop(0, hexToRgba(node.color, glowAlpha));
      grad.addColorStop(0.4, hexToRgba(node.color, glowAlpha * 0.4));
      grad.addColorStop(1, hexToRgba(node.color, 0));
      ctx.beginPath();
      ctx.arc(node.x, node.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Node circle
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);
      ctx.fillStyle = isActive ? lightenColor(node.color, 0.3) : node.color;
      ctx.fill();
      ctx.strokeStyle = isActive ? 'rgba(255, 255, 255, 0.9)' : 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = isActive ? 2 : 1;
      ctx.stroke();

      // Label
      const fontSize = Math.max(8, Math.min(11, node.r * 0.45));
      ctx.font = `bold ${fontSize}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#FFFFFF';
      ctx.fillText(node.label, node.x, node.y);
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function lightenColor(hex, amount) {
      const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + amount * 255);
      const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + amount * 255);
      const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + amount * 255);
      return `rgb(${r | 0}, ${g | 0}, ${b | 0})`;
    }

    function drawShockwaves() {
      for (const sw of shockwaves) {
        // Outer ring
        ctx.beginPath();
        ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(0, 229, 255, ${sw.alpha * 0.6})`;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Inner ring at 0.6x radius
        ctx.beginPath();
        ctx.arc(sw.x, sw.y, sw.r * 0.6, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(124, 77, 255, ${sw.alpha * 0.3})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    function render() {
      frame++;

      updateNodes();
      updateShockwaves();
      updateTraversal();

      drawBackground();
      drawEdges();
      drawTraversalEdges();

      const activeNode = traversalPath.length > 0 ? traversalPath[traversalIndex] : null;
      const visitedSet = new Set(traversalPath.slice(0, traversalIndex + 1));

      for (const node of nodes) {
        const isActive = node === activeNode || visitedSet.has(node);
        drawNode(node, isActive);
      }

      drawShockwaves();

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>
